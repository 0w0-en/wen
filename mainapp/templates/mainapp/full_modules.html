{% load static %}

<!-- Using local Cubic11 font; external Google Fonts removed -->
<link rel="stylesheet" href="{% static 'mainapp/style.css' %}">

<!-- Site header moved to top -->
<div class="site-header">
    <a class="site-action link-button" href="https://carpool-diffusion-letdown.ngrok-free.dev/" target="_blank" rel="noopener noreferrer">組別網站</a>
    <div class="site-header-center">
        <h1 class="title">模組</h1>
    </div>
    <a class="site-action all-modules-button" href="{% url 'home' %}">回主畫面</a>
</div>
<div class="card">
    <div class="card-top">
        <div class="top-actions">
            <a class="all-modules-button" href="{% url 'home' %}">回主畫面</a>
        </div>
    </div>

    <main class="modules-grid full">
        <div class="modules-container full-grid">
            {% for i in modules|slice:":-1" %}
            <div class="module-box box" data-module="{{ i }}">
                <h4>Module {{ i }}</h4>
                <div class="module-value" id="module-{{ i }}">—</div>
            </div>
            {% endfor %}
        </div>
    </main>

    <script>
    const PHP_ENDPOINT = '{{ php_endpoint }}';
    async function fetchModuleStatus(){
        try{
            const url = PHP_ENDPOINT && PHP_ENDPOINT.trim() !== '' ? PHP_ENDPOINT : '{% url "module_status" %}';
            const res = await fetch(url, {cache: 'no-store'});
            if(!res.ok) return;
            const data = await res.json();
            if(!Array.isArray(data.modules)) return;
            data.modules.forEach(m => {
                const el = document.getElementById('module-' + m.id);
                if(el) el.textContent = m.value ?? '—';
            });
        }catch(e){ console.error('module poll error', e); }
    }
    setInterval(fetchModuleStatus, 2000);
    fetchModuleStatus();
    </script>
</div>
