{% load static %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Dancing+Script:wght@400;700&family=Inter:wght@300;400;600;700&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'mainapp/style.css' %}">

<!-- Site header moved to top -->
<div class="site-header">
    <a class="site-action link-button" href="https://carpool-diffusion-letdown.ngrok-free.dev/" target="_blank" rel="noopener noreferrer">組別網站</a>
    <div class="site-header-center">
        <h1 class="title">實境解謎裝置</h1>
        <div class="header-meta">Group 6 &nbsp;•&nbsp; 趙翌雯 &nbsp;•&nbsp; B11313121</div>
    </div>
    <a class="site-action all-modules-button" href="{% url 'full_modules' %}">模組</a>
</div>

<div class="card">
    

    <main class="modules-grid">
        <div class="modules-container">
            <!-- Show only 3 modules (prev/current/next) by default -->
            {% for i in modules|slice:":3" %}
            <div class="module-box box" data-module="{{ i }}">
                <h4>Module {{ i }}</h4>
                <div class="module-value" id="module-{{ i }}">—</div>
            </div>
            {% endfor %}
        </div>
    </main>

    <script>
    // PHP endpoint (optional) injected from Django settings; if empty, use internal API
    const PHP_ENDPOINT = '{{ php_endpoint }}';

    // Polling function to fetch module statuses (from PHP endpoint if provided)
    async function fetchModuleStatus(){
        try{
            const url = PHP_ENDPOINT && PHP_ENDPOINT.trim() !== '' ? PHP_ENDPOINT : '{% url "module_status" %}';
            const res = await fetch(url, {cache: 'no-store'});
            if(!res.ok) return;
            const data = await res.json();
            if(!Array.isArray(data.modules)) return;
            data.modules.forEach(m => {
                const el = document.getElementById('module-' + m.id);
                if(el) el.textContent = m.value ?? '—';
            });
        }catch(e){ console.error('module poll error', e); }
    }

    // start polling every 2 seconds
    setInterval(fetchModuleStatus, 2000);
    fetchModuleStatus();
    </script>
</div>
