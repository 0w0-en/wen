{% load static %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'mainapp/style.css' %}">

<div class="card">
    <header class="center-header">
        <h1 class="title">實境解謎裝置</h1>
        <div class="subtitle meta">Group 6</div>
        <div class="subtitle meta">趙翌雯</div>
        <div class="subtitle meta">B11313121</div>
    </header>

    <main class="modules-grid">
        <section class="link-box box">
            <h3>Links</h3>
            <div id="links-area">
                <!-- Clickable links will be added here later -->
                <p class="meta">連結會在此處顯示（稍後提供）</p>
            </div>
        </section>

        <div class="modules-container">
            <!-- Generate 9 module boxes -->
            {% for i in modules %}
            <div class="module-box box" data-module="{{ i }}">
                <h4>Module {{ i }}</h4>
                <div class="module-value" id="module-{{ i }}">—</div>
            </div>
            {% endfor %}
        </div>
    </main>

    <script>
    // Polling function to fetch module statuses
    async function fetchModuleStatus(){
        try{
            const res = await fetch('{% url "module_status" %}');
            if(!res.ok) return;
            const data = await res.json();
            if(!Array.isArray(data.modules)) return;
            data.modules.forEach(m => {
                const el = document.getElementById('module-' + m.id);
                if(el) el.textContent = m.value ?? '—';
            });
        }catch(e){ console.error('module poll error', e); }
    }
    // start polling every 2 seconds
    setInterval(fetchModuleStatus, 2000);
    fetchModuleStatus();
    </script>
</div>
